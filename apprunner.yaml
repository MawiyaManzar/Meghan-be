version: 1.0

# AWS App Runner configuration for Meghan FastAPI backend
# Docs: https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html

runtime:
  name: python311          # Python 3.11 managed runtime

build:
  commands:
    build:
      - pip install -r requirements.txt

run:
  command: uvicorn main:app --host 0.0.0.0 --port 8000
  network:
    port: 8000
    env: APP_PORT
  env:
    - name: AWS_REGION
      value: us-east-1
    # Sensitive values (DATABASE_URL, SECRET_KEY, S3_MEDIA_BUCKET, etc.)
    # are set in the App Runner console under Configuration → Environment variables.
    # Do NOT put secrets in this file.
